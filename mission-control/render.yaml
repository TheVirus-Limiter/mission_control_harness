# Render.com blueprint. Deploy with: New + > Blueprint > point at this repo.
# (Railway works too: it auto-detects the Procfile.)
services:
  - type: web
    name: mission-control
    runtime: python
    rootDir: mission-control
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn ui.server:app --host 0.0.0.0 --port $PORT"
    envVars:
      # Pin the Python version for a reproducible build.
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Posting stays SAFE in the cloud: dry-run, no keys required. Even if you
      # later add keys, the dashboard launch path is non-interactive -> dry-run.
      - key: DRY_RUN
        value: "1"
      # The dashboard reads/writes this SQLite file (ephemeral on free plans;
      # click RUN MISSION in the UI to generate runs in the cloud).
      - key: MISSION_DB
        value: "mission.db"
    plan: free
