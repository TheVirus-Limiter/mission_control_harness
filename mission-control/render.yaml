# Render.com blueprint. Deploy with: New + > Blueprint > point at this repo.
# (Railway works too: it auto-detects the Procfile.)
services:
  - type: web
    name: mission-control
    runtime: python
    rootDir: mission-control
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn ui.server:app --host 0.0.0.0 --port $PORT"
    envVars:
      # Posting stays safe in the cloud: dry-run, no keys required.
      - key: DRY_RUN
        value: "1"
      # Optional: provide a prebuilt mission.db, or generate runs via the CLI.
      - key: MISSION_DB
        value: "mission.db"
    plan: free
