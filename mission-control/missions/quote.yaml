# ===========================================================================
# A PRICED mission — proves the arithmetic + margin checkpoints actually run.
# A sponsored/promo post whose offer price must add up AND clear the declared
# margin floor before anything is written or posted.
#   python harness.py --mission missions/quote.yaml --yes
# ===========================================================================
mission: "FocusApp Promo — Priced Offer"
description: "Price a launch-week bundle (must clear margin), then write and publish the promo post."

input:
  topic: "FocusApp launch-week bundle offer"
  brand: "FocusApp — calm, evidence-based productivity. Voice: friendly, precise, never hypey."
  audience: "Knowledge workers considering the launch-week bundle."
  handle: "@focusapp"

budgets:
  writer_revisions: 2
  reviewer_retries: 2

admission:
  policy: all_survived

guardrails:
  banned_claims: ["cure", "clinically proven", "guaranteed", "miracle"]
  margin_floor: 0.5          # the stated price must clear cost * 1.5
  citation_required: true
  human_hold_required: true
  recipient_allowlist: []

rubric_criteria: [clarity, on_brand, no_unsupported_claims]

stages:
  - name: research
    type: content
    worker: researcher
    checkpoints: [schema]

  # The priced offer: schema validates the line items, arithmetic recomputes the
  # total, margin enforces the declared floor. THIS is where margin_floor bites.
  - name: compose
    type: content
    worker: composer
    checkpoints: [schema, arithmetic, margin]

  - name: write
    type: content
    worker: writer
    checkpoints: [schema, grounding, banned_claims]

  - name: rehearsal
    type: rehearsal
    worker: reviewer

  - name: action
    type: action
    platform: x
