# ===========================================================================
# A SECOND mission, to prove the harness is the product and the mission is just
# config. This runs on the SAME engine with ZERO code change -- only the
# declared guardrails, budgets, rubric and stages differ.
#
#   python harness.py --mission missions/nonprofit.yaml
# ===========================================================================
mission: "Harbor Animal Shelter — Giving Tuesday"
description: "Research and write a Giving Tuesday fundraising post for Harbor Animal Shelter, then publish to X."

input:
  topic: "Harbor Animal Shelter Giving Tuesday campaign"
  brand: "Harbor Animal Shelter — warm, honest, community-first. Voice: heartfelt, specific, never guilt-tripping."
  audience: "Local supporters and lapsed donors who love animals."
  handle: "@harborshelter"

budgets:
  writer_revisions: 3
  reviewer_retries: 2

admission:
  policy: all_survived

# Different rulebook entirely -- nonprofit claims, not product claims.
guardrails:
  banned_claims:
    - "100% of donations"
    - "tax-deductible"      # only a tax advisor should assert this
    - "guaranteed"
    - "miracle"
    - "no-kill guarantee"
  margin_floor: 0.0          # nothing is being priced/sold here
  citation_required: true
  human_hold_required: true
  recipient_allowlist: []

rubric_criteria:
  - clarity
  - on_brand
  - no_unsupported_claims

stages:
  - name: research
    type: content
    worker: researcher
    checkpoints: [schema]

  - name: write
    type: content
    worker: writer
    checkpoints: [schema, grounding, banned_claims]

  - name: rehearsal
    type: rehearsal
    worker: reviewer

  - name: action
    type: action
    platform: x
