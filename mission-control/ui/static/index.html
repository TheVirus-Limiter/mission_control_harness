<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mission Control</title>
<style>
  :root{
    --bg:#080b11; --panel:#0f1620; --panel2:#0b121b; --line:#1e2a3a;
    --ink:#e8eef5; --dim:#9fb0c3; --faint:#6f8197;
    --accent:#39c0ed; --accent2:#7c5cff;
    --go:#3fb950; --nogo:#f85149; --held:#e3a008;
    --crit:#ff5c5c; --high:#f85149; --med:#d8a531;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font:13.5px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  a{color:var(--accent)}

  /* ---- header ---- */
  header{position:sticky;top:0;z-index:5;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0c131d,#080b11)}
  .bar{display:flex;align-items:center;gap:14px;padding:12px 20px}
  .logo{font-weight:700;letter-spacing:.16em;color:var(--accent);white-space:nowrap}
  .logo small{color:var(--faint);font-weight:400;letter-spacing:.05em}
  .bar .spacer{flex:1}
  select,button{background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:7px 11px;font:inherit;cursor:pointer;transition:.15s}
  button:hover,select:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);color:#04222b;border-color:var(--accent);font-weight:700}
  button.ghost{background:transparent}
  button.danger{border-color:#7a2c2c;color:#ff9c9c}
  button:disabled{opacity:.45;cursor:not-allowed}
  .conn{font-size:11px;color:var(--go)} .conn.down{color:var(--nogo)}

  /* readout strip */
  .readout{display:flex;gap:18px;flex-wrap:wrap;padding:0 20px 11px;color:var(--dim);font-size:12px}
  .readout b{color:var(--ink)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .dot.go{background:var(--go)} .dot.run{background:var(--accent);animation:pulse 1.4s infinite}
  .dot.nogo{background:var(--nogo)} .dot.held{background:var(--held)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ---- tabs ---- */
  nav{display:flex;gap:4px;padding:10px 20px 0;flex-wrap:wrap}
  .tab{padding:9px 16px;border:1px solid var(--line);border-bottom:none;
    border-radius:9px 9px 0 0;background:var(--panel2);color:var(--dim);font:inherit;cursor:pointer}
  .tab[aria-selected="true"]{background:var(--panel);color:var(--ink);border-color:var(--accent)}
  .tab .pill{display:inline-block;margin-left:7px;min-width:18px;padding:0 5px;border-radius:9px;
    font-size:11px;background:#22150c;color:var(--med);border:1px solid #6b4f12}
  .tab .pill.crit{background:#2a0e0e;color:var(--crit);border-color:#7a2020}
  main{padding:16px 20px 70px}
  .view{display:none} .view.active{display:block}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  h2{font-size:12px;letter-spacing:.07em;color:var(--dim);text-transform:uppercase;margin:0 0 12px}
  .empty{color:var(--faint);padding:28px;text-align:center}

  /* ---- timeline ---- */
  .filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .chip{padding:4px 11px;border:1px solid var(--line);border-radius:999px;background:var(--panel2);
    color:var(--dim);font-size:12px;cursor:pointer}
  .chip.on{border-color:var(--accent);color:var(--ink)}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--faint);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  tbody tr:hover{background:#0c1521}
  td.seq{color:var(--faint);width:38px} td.stg{color:var(--accent2);width:96px}
  td.tm{color:var(--faint);width:64px;font-size:12px}
  .st{display:inline-block;min-width:72px;text-align:center;padding:2px 8px;border-radius:6px;
    font-size:11px;font-weight:800;letter-spacing:.03em}
  .st.go{background:#0e2716;color:#56d364;border:1px solid #1f6f33}
  .st.nogo{background:#2a0e0e;color:#ff7b72;border:1px solid #7a2020}
  .st.held{background:#2a2207;color:var(--held);border:1px solid #7a5a07}
  .st.accent{background:#06222b;color:var(--accent);border:1px solid #1d5a6b}
  .st.crit{background:#2a0e0e;color:var(--crit);border:1px solid #7a2020}
  .st.high{background:#2a0e0e;color:#ff7b72;border:1px solid #7a2020}
  .st.med{background:#22150c;color:var(--med);border:1px solid #6b4f12}
  .st.muted{background:transparent;color:var(--faint);border:1px solid var(--line)}
  .rowmeta{color:var(--faint);font-size:12px;margin-top:2px}
  tr.r-nogo td,tr.r-crit td,tr.r-high td{background:rgba(248,81,73,.05)}

  /* ---- broadcast ---- */
  .grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:18px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .proof{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;
    border:1px solid #1d5a6b;background:#06222b;border-radius:8px;color:var(--accent);font-size:12px}
  .xpost{max-width:560px}
  .xhead{display:flex;align-items:center;gap:11px;margin-bottom:9px}
  .avatar{width:44px;height:44px;border-radius:50%;flex:none;
    background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .xid{display:flex;flex-direction:column;line-height:1.25;min-width:0}
  .xname{font-weight:700;font-family:system-ui,Segoe UI,sans-serif;display:flex;align-items:center;gap:5px}
  .xverify{color:var(--accent)}
  .xhandle{color:var(--dim);font-size:13px}
  .flag{margin-left:auto;font-weight:800;font-size:11px;padding:3px 9px;border-radius:6px;letter-spacing:.04em}
  .flag.dry{color:var(--med);border:1px solid #7a5a07;background:#22150c}
  .flag.live{color:var(--nogo);border:1px solid #7a2020;background:#2a0e0e}
  .flag.staged{color:var(--dim);border:1px solid var(--line)}
  .flag.down{color:var(--held);border:1px solid #7a5a07}
  .xtext{font-size:17px;line-height:1.5;white-space:pre-wrap;font-family:system-ui,Segoe UI,sans-serif;
    margin:2px 0 4px}
  .xtext .tag{color:var(--accent)}
  .xactions{display:flex;gap:28px;align-items:center;margin-top:13px;padding-top:11px;
    border-top:1px solid var(--line);color:var(--faint);font-size:16px}
  .cc{margin-left:auto;font-size:12px;color:var(--dim)} .cc.over{color:var(--nogo);font-weight:700}
  .act-row{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
  .blocked{border:1px solid var(--nogo);background:#170a0a;border-radius:12px;padding:18px}
  .blocked .b-no{color:var(--nogo);font-weight:800;letter-spacing:.07em;font-size:15px;margin-bottom:8px}
  .blocked .b-why{color:var(--ink);margin-bottom:8px} .blocked .b-rec{color:var(--dim);font-size:13px}
  .awaiting{border:1px solid #7a5a07;background:#1c1606;border-radius:10px;padding:12px;margin-bottom:12px}
  .awaiting b{color:var(--held)}

  .consent{display:inline-block;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:11px}
  .consent.go{background:#0e2716;color:#56d364;border:1px solid #1f6f33}
  .consent.hold{background:#2a2207;color:var(--held);border:1px solid #7a5a07}
  .reviewers{display:flex;flex-direction:column;gap:10px}
  .rev{border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--panel2)}
  .rev .top{display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap}
  .rev .model{font-weight:700} .src{font-size:10px;padding:1px 6px;border-radius:5px;border:1px solid var(--line);color:var(--dim)}
  .src.anthropic{color:#d98c5f;border-color:#5a3d2a} .src.openai{color:#74c69d;border-color:#2c5a44}
  .src.nvidia{color:#9fd356;border-color:#4a6b1f}
  .vbadge{margin-left:auto;font-size:11px;font-weight:800;padding:2px 9px;border-radius:6px}
  .vbadge.pass{background:#0e2716;color:#56d364;border:1px solid #1f6f33}
  .vbadge.held{background:#2a2207;color:var(--held);border:1px solid #7a5a07}
  .rev .reason{color:var(--dim);font-size:13px;margin-bottom:7px}
  .crits{display:flex;gap:6px;flex-wrap:wrap}
  .crit-chip{font-size:11px;padding:1px 8px;border-radius:999px;border:1px solid}
  .crit-chip.pass{color:#56d364;border-color:#1f6f33} .crit-chip.fail{color:var(--nogo);border-color:#7a2020}
  .note{color:var(--faint);font-size:12px;margin-top:11px}

  /* ---- alarms ---- */
  .alarm{border-left:4px solid;border-radius:8px;padding:13px 14px;margin-bottom:11px;background:var(--panel2)}
  .alarm.crit{border-color:var(--crit)} .alarm.high{border-color:var(--high)} .alarm.med{border-color:var(--med)}
  .alarm .atop{display:flex;align-items:center;gap:9px;margin-bottom:5px}
  .alarm .sev{text-transform:uppercase;font-size:10px;letter-spacing:.1em;padding:1px 7px;border-radius:5px;font-weight:800}
  .alarm.crit .sev{background:#2a0e0e;color:var(--crit)} .alarm.high .sev{background:#2a0e0e;color:#ff7b72}
  .alarm.med .sev{background:#22150c;color:var(--med)}
  .alarm .atype{font-weight:800;letter-spacing:.03em}
  .alarm .actx{color:var(--ink);margin-bottom:6px}
  .alarm .arec{color:var(--dim);font-size:13px} .alarm .arec::before{content:"▸ ";color:var(--accent)}
  .alarm .afail{margin-top:7px;font-size:12px;color:#ffb3b3}

  /* ---- gauntlet ---- */
  .track{margin:0 0 24px;border:1px solid var(--line);border-radius:12px;padding:16px;background:var(--panel)}
  .who{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .who .nm{font-weight:700} .who .meta{color:var(--faint);font-size:12px}
  .who .stamp{margin-left:auto;font-weight:800;letter-spacing:.08em;padding:3px 12px;border-radius:7px;border:2px solid}
  .stamp.ok{color:var(--go);border-color:var(--go)} .stamp.no{color:var(--nogo);border-color:var(--nogo)}
  .lane{position:relative;height:8px;background:var(--panel2);border-radius:6px;margin:14px 0 12px;overflow:hidden}
  .lane .fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:6px;width:0;transition:width 1.4s ease}
  .runner{position:absolute;top:-7px;font-size:16px;transform:translateX(-50%);transition:left 1.4s ease}
  .obstacles{display:flex;gap:9px;flex-wrap:wrap}
  .obs{flex:1;min-width:140px;border:1px solid var(--line);border-radius:10px;padding:11px;background:var(--panel2)}
  .obs.fall{border-color:#7a2020;background:#170a0a;animation:shake .5s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
  .obs .ico{font-size:19px} .obs .nm{font-size:12px;color:var(--dim);margin:5px 0}
  .obs .res{font-weight:800;font-size:12px} .obs.pass .res{color:var(--go)} .obs.fall .res{color:var(--nogo)}
  .leak{margin-top:8px;font-size:11px;color:#ffb3b3;background:#1a0808;border:1px dashed #7a2020;
    border-radius:6px;padding:6px;white-space:pre-wrap;word-break:break-word}

  @media(max-width:480px){
    .bar{flex-wrap:wrap} .xtext{font-size:16px} .obs{min-width:0;flex-basis:calc(50% - 9px)}
    .xactions{gap:18px}
  }
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo">▣ MISSION&nbsp;CONTROL <small>· trust harness</small></div>
    <div class="spacer"></div>
    <span id="conn" class="conn">● live</span>
    <select id="runsel" aria-label="select run"></select>
    <button id="refresh" aria-label="refresh" title="refresh">↻</button>
  </div>
  <div class="readout" id="readout" aria-live="polite"></div>
  <nav role="tablist">
    <button class="tab" role="tab" aria-selected="true" data-v="timeline">Mission Timeline</button>
    <button class="tab" role="tab" aria-selected="false" data-v="broadcast">Broadcast &amp; Review</button>
    <button class="tab" role="tab" aria-selected="false" data-v="gauntlet">Admission Gauntlet</button>
    <button class="tab" role="tab" aria-selected="false" data-v="alarms">Alarms<span id="alarmPill" class="pill" hidden>0</span></button>
  </nav>
</header>
<main>
  <section id="timeline" class="view active" role="tabpanel"></section>
  <section id="broadcast" class="view" role="tabpanel"></section>
  <section id="gauntlet" class="view" role="tabpanel"></section>
  <section id="alarms" class="view" role="tabpanel"></section>
</main>

<script>
const $ = s => document.querySelector(s);
const esc = s => (s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let runId=null, cache=null, lastSig=null, activeTab='timeline', timer=null, tfilter='all', animKey=null;

async function getJSON(u,opt){ const r=await fetch(u,opt); if(!r.ok && r.status>=500) throw new Error(r.status); return r.json(); }
function setConn(ok){ const c=$('#conn'); c.className='conn'+(ok?'':' down'); c.textContent=ok?'● live':'● disconnected — retrying'; }
function relTime(ts){ if(!ts) return ''; const d=new Date(ts*1000); return d.toLocaleTimeString([], {hour12:false}); }
function srcOf(name){ const n=(name||'').toLowerCase(); if(n.includes('anthropic')||n.includes('claude'))return'anthropic';
  if(n.includes('openai')||n.includes('gpt'))return'openai'; if(n.includes('nvidia')||n.includes('nim')||n.includes('deepseek')||n.includes('mistral')||n.includes('llama')||n.includes('qwen')||n.includes('gemma')||n.includes('phi')||n.includes('nemotron'))return'nvidia'; return''; }

async function loadRuns(){
  const runs = await getJSON('/api/runs');
  const sel=$('#runsel'); sel.innerHTML = runs.map(r=>`<option value="${r.run_id}">${esc(r.run_id)} · ${esc(r.status)}</option>`).join('');
  if(!runs.length){ $('#timeline').innerHTML='<div class="empty">No runs yet. Run <code>python harness.py</code> then refresh.</div>'; return; }
  const hash=location.hash.slice(1);
  runId = (hash && runs.find(r=>r.run_id===hash)) ? hash : (runId && runs.find(r=>r.run_id===runId) ? runId : runs[0].run_id);
  sel.value=runId; location.hash=runId;
}

async function tick(){
  if(!runId) return;
  try{
    const d = await getJSON('/api/runs/'+runId);
    setConn(true);
    const last=d.timeline[d.timeline.length-1];
    const sig=[d.run_id,d.timeline.length,last?last.seq:0,d.status,d.taken_down].join('|');
    if(sig!==lastSig){ lastSig=sig; cache=d; renderHeader(d); renderActive(); }
  }catch(e){ setConn(false); }
}

function renderHeader(d){
  const dotcls = d.status.includes('posted')?'go': d.status==='halted'?'nogo': d.status.includes('awaiting')?'held':'run';
  $('#readout').innerHTML =
    `<span><span class="dot ${dotcls}"></span><b>${esc(d.status.toUpperCase())}</b></span>`+
    `<span>MISSION <b>${esc(d.mission)}</b></span>`+
    `<span>RUN <b>${esc(d.run_id)}</b></span>`+
    `<span>${d.agents_certified} agents certified</span>`+
    `<span>${(d.alarms||[]).length} alarm${(d.alarms||[]).length===1?'':'s'} raised</span>`+
    (d.rehearsal_proof?`<span>🔒 rehearsed · egress ${esc(d.rehearsal_proof.egress)}</span>`:'');
  const ap=$('#alarmPill'); const n=(d.alarms||[]).length;
  ap.hidden=!n; ap.textContent=n; ap.className='pill'+((d.alarms||[]).some(a=>a.severity==='critical')?' crit':'');
}

function renderActive(){ ({timeline:renderTimeline,broadcast:renderBroadcast,gauntlet:renderGauntlet,alarms:renderAlarms}[activeTab])(cache); }

/* ---------- timeline ---------- */
function renderTimeline(d){
  const want = r => tfilter==='all' || (tfilter==='alarms'&&r.kind==='alarm') ||
    (tfilter==='gates'&&['gate','attack','certificate','panel','verdict'].includes(r.kind)) ||
    (tfilter==='checks'&&r.kind==='check');
  const rows = d.timeline.filter(want).map(r=>`
    <tr class="r-${r.tone}">
      <td class="seq">${r.seq}</td><td class="tm">${relTime(r.ts)}</td>
      <td class="stg">${esc(r.stage)}</td>
      <td><span class="st ${r.tone}">${esc(r.status)}</span></td>
      <td>${esc(r.text)}${r.meta?`<div class="rowmeta">${esc(r.meta)}</div>`:''}</td>
    </tr>`).join('');
  $('#timeline').innerHTML = `
    <div class="filters">
      ${['all','alarms','gates','checks'].map(f=>`<span class="chip ${tfilter===f?'on':''}" data-f="${f}">${f}</span>`).join('')}
    </div>
    <div class="card"><table>
      <thead><tr><th>#</th><th>time</th><th>stage</th><th>status</th><th>event</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" class="empty">no matching events</td></tr>'}</tbody>
    </table></div>`;
  $('#timeline').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{tfilter=c.dataset.f;renderTimeline(cache);});
}

/* ---------- broadcast ---------- */
function renderBroadcast(d){
  const p=d.post||{};
  if(d.halted || (!p.present)){
    const a=(d.alarms||[]).find(x=>['CERTIFICATION_FAILED','ESCALATE_HUMAN'].includes(x.type))||(d.alarms||[])[0];
    $('#broadcast').innerHTML = a ? `<div class="blocked">
        <div class="b-no">⛔ POST BLOCKED BY THE HARNESS — it never reached X</div>
        <div class="b-why">${esc(a.type)} — ${esc(a.context)}</div>
        <div class="b-rec">▸ ${esc(a.recommended_action)}</div></div>`
      : '<div class="empty">No post for this run.</div>';
    return;
  }
  const text = esc(p.text).replace(/(\[[A-Za-z0-9_]+\])/g,'<span class="tag">$1</span>')
    .replace(/(#[A-Za-z0-9_]+)/g,'<span class="tag">$1</span>');
  const brand = (d.mission||'').split('—')[0].trim() || 'Brand';
  let flag = p.posted ? (p.live?'<span class="flag live">● LIVE</span>':'<span class="flag dry">DRY RUN</span>')
                      : '<span class="flag staged">STAGED · not sent</span>';
  if(d.taken_down) flag='<span class="flag down">TAKEN DOWN</span>';
  const over = p.within_limit===false;
  const proof = d.rehearsal_proof
    ? `<div class="proof">🔒 Rehearsed in a sandbox with network egress <b>${esc(d.rehearsal_proof.egress)}</b> · ${d.rehearsal_proof.byte_len} bytes, byte-identical to the live payload</div>` : '';
  const awaiting = d.awaiting
    ? `<div class="awaiting"><b>AWAITING HUMAN APPROVAL</b> — nothing posts (even dry-run) until you approve.</div>` : '';

  const card = `
    <div class="card xpost">
      <div class="xhead"><div class="avatar"></div>
        <div class="xid"><span class="xname">${esc(brand)}<span class="xverify">✓</span></span>
          <span class="xhandle">${esc(p.author||'@yourbrand')} · now</span></div>${flag}</div>
      <div class="xtext">${text}</div>
      <div class="xactions"><span>↩</span><span>⟲</span><span>♡</span><span>↗</span>
        <span class="cc ${over?'over':''}">${p.char_count||0}/280</span></div>
    </div>`;

  const actions = `<div class="act-row">
      ${d.awaiting?'<button class="primary" id="approveBtn">Approve &amp; post (dry-run)</button>':''}
      ${d.can_takedown?'<button class="danger ghost" id="takedownBtn">Take down (rollback)</button>':''}
    </div>`;

  const panel=d.panel||{judges:[]};
  let consent='';
  if(panel.present) consent = panel.eligible
    ? `<span class="consent go">✓ UNANIMOUS CONSENT — publish-eligible</span>`
    : `<span class="consent hold">⏸ HELD — a judge flagged a criterion</span>`;
  const cards=(panel.judges||[]).map(j=>{
    const cls=j.verdict==='PASS'?'pass':'held'; const src=srcOf(j.name);
    const chips=Object.entries(j.criteria||{}).map(([k,v])=>`<span class="crit-chip ${v}">${esc(k)}</span>`).join('');
    return `<div class="rev"><div class="top"><span class="model">${esc(j.name)}</span>
      ${src?`<span class="src ${src}">${src}</span>`:''}
      <span class="vbadge ${cls}">${esc(j.verdict)}</span></div>
      <div class="reason">${esc(j.reason)}</div><div class="crits">${chips}</div></div>`;
  }).join('') || '<div class="empty">No review panel yet.</div>';

  $('#broadcast').innerHTML = `<div class="grid">
    <div><h2>Simulated X — exactly what would be sent</h2>${proof}${awaiting}${card}${actions}</div>
    <div><h2>Review panel · ${esc((panel.rubric||[]).join(' · '))}</h2>${consent}
      <div class="reviewers">${cards}</div>
      <div class="note">Binary pass/fail per criterion · unanimous consent · no likes, scores, or averages.</div>
    </div></div>`;

  const ab=$('#approveBtn');
  if(ab) ab.onclick=async()=>{ ab.disabled=true; ab.textContent='posting…';
    const r=await fetch('/api/runs/'+runId+'/approve',{method:'POST'}); const res=await r.json();
    if(!res.ok){ ab.disabled=false; ab.textContent='Approve & post (dry-run)'; alert('Cannot post: '+res.reason); }
    lastSig=null; tick(); };
  const tb=$('#takedownBtn');
  if(tb) tb.onclick=async()=>{ if(!confirm('Take down this post (record a rollback)?'))return;
    tb.disabled=true; tb.textContent='removing…';
    const r=await fetch('/api/runs/'+runId+'/takedown',{method:'POST'}); await r.json(); lastSig=null; tick(); };
}

/* ---------- gauntlet ---------- */
function renderGauntlet(d){
  const g=d.gauntlet||[];
  if(!g.length){ $('#gauntlet').innerHTML='<div class="card empty">No admission runs recorded for this run.</div>'; return; }
  $('#gauntlet').innerHTML = `<div style="margin-bottom:12px;color:var(--dim);font-size:12px">
      Each obstacle is one real attack class · a fall is a real canary leak (actual output shown)</div>` +
    g.map((a,gi)=>{
      const firstFall=a.attacks.findIndex(x=>!x.survived);
      const pct = firstFall<0 ? 100 : Math.round((firstFall/a.attacks.length)*100);
      const obs=a.attacks.map(x=>`
        <div class="obs ${x.survived?'pass':'fall'}">
          <div class="ico">${x.survived?'🛡️':'💥'}</div><div class="nm">${esc(x.attack)}</div>
          <div class="res">${x.survived?'SURVIVED':'BREACH'}</div>
          ${x.survived?'':`<div class="leak">${esc(x.leaked||'')}</div>`}
        </div>`).join('');
      return `<div class="track" data-gi="${gi}">
        <div class="who"><span class="nm">${esc(a.agent)}</span>
          <span class="meta">policy ${esc(a.policy||'')} · canary ${esc(a.canary||'')}</span>
          <span class="stamp ${a.certified?'ok':'no'}">${a.certified?'CERTIFIED':'REFUSED'}</span></div>
        <div class="lane"><div class="fill" data-pct="${pct}"></div>
          <div class="runner" data-pct="${pct}">${a.certified?'🏁':'🏃'}</div></div>
        <div class="obstacles">${obs}</div></div>`;
    }).join('');
  // animate once per run (not on every poll)
  if(animKey!==d.run_id){ animKey=d.run_id;
    requestAnimationFrame(()=>$('#gauntlet').querySelectorAll('.fill,.runner').forEach(el=>{
      const pct=el.dataset.pct; if(el.classList.contains('fill'))el.style.width=pct+'%'; else el.style.left=pct+'%'; }));
  } else { $('#gauntlet').querySelectorAll('.fill').forEach(el=>el.style.width=el.dataset.pct+'%');
    $('#gauntlet').querySelectorAll('.runner').forEach(el=>el.style.left=el.dataset.pct+'%'); }
}

/* ---------- alarms ---------- */
function renderAlarms(d){
  const a=d.alarms||[];
  $('#alarms').innerHTML = a.length ? `<div class="card">${a.map(x=>{
    const sev={critical:'crit',high:'high',medium:'med'}[x.severity]||'high';
    const fails=x.failed_attacks?`<div class="afail">failed attacks: ${x.failed_attacks.map(f=>esc(f.attack||f)).join(', ')}</div>`:'';
    return `<div class="alarm ${sev}"><div class="atop"><span class="sev">${esc(x.severity)}</span>
      <span class="atype">${esc(x.type)}</span><span style="color:var(--faint);margin-left:auto;font-size:12px">${esc(x.stage)}</span></div>
      <div class="actx">${esc(x.context)}</div><div class="arec">${esc(x.recommended_action)}</div>${fails}</div>`;
  }).join('')}</div>` : '<div class="card empty">No alarms — every gate is clean. ✓</div>';
}

/* ---------- tabs / wiring ---------- */
function selectTab(t){ activeTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected', x.dataset.v===t));
  document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active', x.id===t));
  if(cache) renderActive();
}
document.querySelectorAll('.tab').forEach((t,i,all)=>{
  t.onclick=()=>selectTab(t.dataset.v);
  t.onkeydown=e=>{ if(e.key==='ArrowRight'){all[(i+1)%all.length].focus();all[(i+1)%all.length].click();}
    if(e.key==='ArrowLeft'){all[(i-1+all.length)%all.length].focus();all[(i-1+all.length)%all.length].click();} };
});
$('#runsel').onchange=e=>{ runId=e.target.value; location.hash=runId; lastSig=null; tick(); };
$('#refresh').onclick=async()=>{ await loadRuns(); $('#runsel').value=runId; lastSig=null; tick(); };
window.addEventListener('hashchange',()=>{ const h=location.hash.slice(1); if(h&&h!==runId){runId=h;$('#runsel').value=h;lastSig=null;tick();} });
document.addEventListener('visibilitychange',()=>{ if(document.hidden){clearInterval(timer);timer=null;}
  else if(!timer){ tick(); timer=setInterval(tick,2500);} });

async function boot(){ $('#timeline').innerHTML='<div class="empty">loading flight log…</div>';
  await loadRuns(); await tick(); timer=setInterval(tick,2500); }
boot().catch(e=>{ $('#timeline').innerHTML='<div class="empty">'+esc(e.message)+'</div>'; });
</script>
</body>
</html>
