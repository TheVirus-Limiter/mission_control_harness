<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mission Control — Trust Harness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#040706; --ink:#bdeccf; --ink-bright:#eaf4ee; --dim:#9fc7b1; --faint:#5d7a6c; --faintest:#46604f;
  --go:#35ff9e; --held:#ffb454; --no:#ff5466; --high:#ff8a5c; --cyan:#6fd0ef; --gold:#ffd24a;
  --tier-deep:#c5a8ff; --tier-standard:#8fdcff; --tier-lexical:#ffce8a; --tier-untrust:#ff9aa3;
  --panel:rgba(8,16,12,.6); --panel2:rgba(6,12,9,.5); --hair:rgba(53,255,158,.14); --console:rgba(3,7,5,.92);
  --x-bg:#000; --x-border:#2f3336; --x-text:#e7e9ea; --x-muted:#71767b; --x-blue:#1d9bf0; --x-av:#5b53b8;
  --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Space Grotesk',system-ui,sans-serif; --arc:'Press Start 2P',monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;
  height:100vh;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:rgba(53,255,158,.18);border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ---- fixed background layers ---- */
#rain,.scan,.vig{position:fixed;inset:0;pointer-events:none}
#rain{z-index:0;opacity:.07}
.scan{z-index:1;background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 1px,transparent 1px 3px);mix-blend-mode:multiply}
.vig{z-index:2;box-shadow:inset 0 0 240px 50px rgba(0,0,0,.85)}

/* ---- shell column ---- */
#app{position:relative;z-index:3;display:flex;flex-direction:column;height:100vh;min-height:0}

/* ---- header ---- */
#hdr{flex:none;display:flex;align-items:center;gap:16px;padding:10px 20px;border-bottom:1px solid var(--hair);
  background:rgba(4,9,7,.7);backdrop-filter:blur(6px)}
.brand{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--go);text-shadow:0 0 12px rgba(53,255,158,.6);letter-spacing:.02em}
.stepper{display:flex;align-items:center;gap:2px}
.step{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;padding:5px 10px;border-radius:7px;
  border:1px solid transparent;color:var(--faintest);letter-spacing:.05em;text-transform:uppercase;transition:.2s}
.step .dot{width:6px;height:6px;border-radius:50%;background:#2c4636}
.step.done{color:#6fae8e}.step.done .dot{background:var(--go)}
.step.done{cursor:pointer}
.step.active{color:var(--go);background:rgba(53,255,158,.1);border-color:rgba(53,255,158,.4)}
.step.active .dot{background:var(--go);box-shadow:0 0 8px var(--go)}
.step.fail{color:var(--no)}.step.fail .dot{background:var(--no);box-shadow:0 0 8px var(--no)}
.step.dim{opacity:.4}
.sep{color:#2c4636;font-size:11px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:11px}
.agent-chip{color:var(--dim);border:1px solid var(--hair);border-radius:7px;padding:4px 9px}
.agent-chip b{color:var(--ink-bright)}
.live{display:flex;align-items:center;gap:6px;color:var(--go);font-size:10.5px;letter-spacing:.08em}
.live .d{width:7px;height:7px;border-radius:50%;background:var(--go);box-shadow:0 0 8px var(--go);animation:pulse 1.5s infinite}

/* ---- stage ---- */
#stage{flex:1;min-height:0;overflow:auto;position:relative}

/* ---- console dock ---- */
#dock{flex:none;border-top:1px solid var(--hair);background:var(--console);transition:height .2s;height:182px;display:flex;flex-direction:column}
#dock.collapsed{height:38px}
.dock-bar{flex:none;display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--faint);border-bottom:1px solid rgba(53,255,158,.07)}
.dock-bar b{color:var(--dim)}
.dock-bar .meta{margin-left:auto;display:flex;gap:14px;align-items:center;color:var(--faint)}
.dock-bar .cost{color:var(--cyan)}
#dock.collapsed .dock-body{display:none}
.dock-body{flex:1;overflow:auto;padding:6px 0 10px}
.logrow{display:grid;grid-template-columns:54px 90px 88px 1fr;gap:10px;padding:3px 14px;font-family:var(--mono);font-size:12px;line-height:1.45;align-items:baseline}
.logrow.bad{border-left:2px solid var(--no);background:rgba(255,84,102,.05)}
.logrow .t{color:#4f7163}
.logrow .sg{color:#6f9fb0}
.logrow .bd{font-weight:700;font-size:10.5px;padding:1px 7px;border-radius:5px;justify-self:start;white-space:nowrap}
.logrow .tx{color:var(--ink)}
.logrow .tx .mt{color:var(--faint);font-size:11px;margin-top:1px}
.empty-log{padding:10px 16px;font-family:var(--mono);font-size:12px;color:var(--faint)}
.cur::after{content:'█';animation:blink 1s steps(2) infinite;color:var(--go)}

/* status colors */
.c-go{color:var(--go);background:rgba(53,255,158,.15)}
.c-no{color:var(--no);background:rgba(255,84,102,.16)}
.c-high{color:var(--high);background:rgba(255,138,92,.15)}
.c-held{color:var(--held);background:rgba(255,180,84,.15)}
.c-cyan{color:var(--cyan);background:rgba(111,208,239,.15)}
.c-mut{color:#6f8f7f;background:rgba(111,143,127,.12)}

/* ---- generic ---- */
.wrap{max-width:1080px;margin:0 auto;padding:34px 24px}
.h-arc{font-family:var(--arc);color:var(--go);text-shadow:0 0 16px rgba(53,255,158,.5)}
.sub{color:var(--dim);font-size:13px;line-height:1.6;max-width:760px}
.btn{font-family:var(--mono);font-weight:700;font-size:12px;border-radius:9px;padding:11px 18px;border:1px solid var(--hair);
  background:rgba(53,255,158,.06);color:var(--ink);transition:.16s;letter-spacing:.03em}
.btn:hover{border-color:rgba(53,255,158,.4)}
.btn.go{background:rgba(53,255,158,.12);border-color:rgba(53,255,158,.5);color:var(--go);box-shadow:0 0 14px rgba(53,255,158,.2)}
.btn.go:disabled{opacity:.4;box-shadow:none;cursor:not-allowed}
.btn.arc{font-family:var(--arc);font-size:12px;padding:13px 20px}
.btn.red{color:var(--no);border-color:rgba(255,84,102,.4);background:rgba(255,84,102,.08)}
.btn.ghost{background:transparent;color:var(--dim)}
.chip-row{display:flex;flex-wrap:wrap;gap:8px}
.qchip{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:7px;border:1px solid var(--hair);color:var(--dim);background:rgba(8,16,12,.5)}
.qchip:hover{border-color:rgba(53,255,158,.4);color:var(--ink)}

/* ---- SELECT ---- */
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:22px 0}
.mcard{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:16px 13px 15px;border-radius:13px;
  background:var(--panel);border:1px solid var(--hair);cursor:pointer;transition:.16s;position:relative}
.mcard:hover{border-color:rgba(53,255,158,.35)}
.mcard.sel{border-color:var(--go);background:rgba(53,255,158,.07);box-shadow:0 0 18px rgba(53,255,158,.2)}
.mcard.sel.unt{border-color:var(--no);background:rgba(255,84,102,.07);box-shadow:0 0 18px rgba(255,84,102,.2)}
.mcard .nm{font-weight:700;font-size:13.5px;color:var(--ink-bright)}
.mcard .id{font-family:var(--mono);font-size:9.5px;color:var(--faint);word-break:break-all;line-height:1.4}
.tier{font-family:var(--mono);font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:6px}
.tier.deep{color:var(--tier-deep);background:rgba(155,108,255,.18)}
.tier.standard{color:var(--tier-standard);background:rgba(57,197,255,.16)}
.tier.lexical{color:var(--tier-lexical);background:rgba(255,180,84,.16)}
.tier.untrust{color:var(--tier-untrust);background:rgba(255,84,102,.2)}
.field-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:18px 0 8px}
.tinput{width:100%;font-family:var(--mono);font-size:13.5px;background:#07120d;border:1px solid var(--hair);border-radius:9px;padding:11px 13px;color:var(--ink)}
.tinput:focus{outline:none;border-color:rgba(53,255,158,.4)}
.ctrls{display:flex;flex-wrap:wrap;align-items:flex-end;gap:22px;margin-top:20px}
.seg{display:flex;border:1px solid var(--hair);border-radius:8px;overflow:hidden}
.seg button{font-family:var(--mono);font-size:11px;padding:7px 12px;border:none;background:transparent;color:var(--dim)}
.seg button.on{background:rgba(53,255,158,.12);color:var(--go)}
.toggle{display:flex;align-items:center;gap:10px}
.tk{width:44px;height:24px;border-radius:999px;background:#26352c;position:relative;transition:.18s;border:1px solid var(--hair)}
.tk .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#7d9488;transition:.18s}
.tk.on{background:rgba(53,255,158,.25)}.tk.on .knob{left:23px;background:var(--go)}
.tlabel{font-family:var(--mono);font-size:11px;color:var(--dim)}
.hint{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:14px}
.sess-strip{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:6px}
.sess-strip b{color:var(--cyan)}

/* ---- robot sprite ---- */
.bot{position:relative;width:36px;height:46px;transform-origin:bottom center}
.bot span{position:absolute;background:var(--bd)}
.bot-ant{top:1px;left:17px;width:2px;height:7px;background:var(--tr)!important}
.bot-ant::after{content:'';position:absolute;top:-3px;left:-2px;width:6px;height:6px;border-radius:50%;background:var(--tr);box-shadow:0 0 6px var(--tr)}
.bot-head{top:7px;left:6px;width:24px;height:18px;border-radius:6px}
.bot-visor{top:12px;left:9px;width:18px;height:9px;background:#0a140f!important;border-radius:3px;display:flex;gap:3px;align-items:center;justify-content:center}
.bot-visor i{position:static;width:4px;height:4px;border-radius:50%;background:var(--tr);box-shadow:0 0 5px var(--tr)}
.bot-body{top:25px;left:7px;width:22px;height:15px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-family:var(--arc);font-size:8px;color:#0a140f}
.bot-arm{top:25px;width:4px;height:12px;border-radius:2px;transform-origin:top center}
.bot-arm.l{left:4px}.bot-arm.r{right:4px}
.bot-leg{top:38px;width:5px;height:9px;border-radius:2px;transform-origin:top center}
.bot-leg.l{left:11px}.bot-leg.r{right:11px}
.bot-run{animation:hop .34s infinite}
.bot-run .bot-leg.l{animation:rl .34s infinite}.bot-run .bot-leg.r{animation:rl .34s infinite reverse}
.bot-run .bot-arm.l{animation:ap .34s infinite reverse}.bot-run .bot-arm.r{animation:ap .34s infinite}
.bot-down{transform:rotate(82deg);filter:grayscale(1)}
.bot-down .bot-visor i{background:var(--no);box-shadow:0 0 5px var(--no)}
.bot-win{animation:hop .9s infinite}

/* generic phase panel */
.phase{padding:24px}
.glass{background:var(--panel);border:1px solid var(--hair);border-radius:13px;padding:16px}

/* ---- keyframes ---- */
@keyframes blink{50%{opacity:0}}
@keyframes pulse{50%{opacity:.32}}
@keyframes hop{50%{transform:translateY(-6px)}}
@keyframes rl{0%,100%{transform:rotate(30deg)}50%{transform:rotate(-30deg)}}
@keyframes ap{0%,100%{transform:rotate(-34deg)}50%{transform:rotate(34deg)}}
@keyframes sw{to{transform:rotate(360deg)}}
@keyframes fl{0%,100%{transform:rotate(10deg)}50%{transform:rotate(-10deg)}}
@keyframes pedal{to{transform:rotate(360deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes twinkle{0%,100%{opacity:.25}50%{opacity:.9}}
@keyframes wavesurf{to{background-position-x:64px}}
@keyframes splash{to{transform:translateY(-26px);opacity:0}}
@keyframes speedline{from{transform:translateX(40px);opacity:.9}to{transform:translateX(-160px);opacity:0}}
@keyframes flyout{to{transform:translate(180px,-160px);opacity:0}}
@keyframes bangflash{from{transform:scale(.2);opacity:1}to{transform:scale(2.6);opacity:0}}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes winsweep{from{transform:translateX(-100%) skewX(-18deg)}to{transform:translateX(220%) skewX(-18deg)}}
@keyframes slam{0%{transform:scale(2.3) rotate(-15deg);opacity:0}60%{transform:scale(.9) rotate(-15deg);opacity:1}100%{transform:scale(1) rotate(-15deg)}}
@keyframes flash{50%{opacity:.25}}
@keyframes float1{50%{transform:translateY(-6px)}}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<canvas id="rain"></canvas>
<div class="scan"></div>
<div class="vig"></div>

<div id="app">
  <header id="hdr">
    <span class="brand">█ HARNESS</span>
    <nav class="stepper" id="stepper"></nav>
    <div class="hdr-right">
      <span class="agent-chip" id="agentChip" hidden></span>
      <span class="live"><span class="d"></span>STORE LIVE</span>
    </div>
  </header>

  <main id="stage"></main>

  <section id="dock">
    <div class="dock-bar" id="dockBar">
      <span>▸ <b>TELEMETRY</b></span>
      <span style="color:var(--faintest)">// live flight log · persists across every gate</span>
      <span class="meta"><span class="cost" id="dockCost"></span><span id="dockN">0 events</span><span id="dockCaret">▼</span></span>
    </div>
    <div class="dock-body" id="dockBody"><div class="empty-log cur">awaiting launch… </div></div>
  </section>
</div>

<script>
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function J(u,opt){const r=await fetch(u,opt);if(!r.ok&&r.status>=500)throw new Error('HTTP '+r.status);return r.json();}
const stripCites=t=>(t||'').replace(/\s*\[f\d+\]/g,'');

/* ===== state ===== */
const PHASES=['select','gauntlet','write','rehearsal','approval'];
const STEP_LABELS={select:'PICK',gauntlet:'GAUNTLET',write:'WRITE',rehearsal:'REHEARSAL',approval:'APPROVE'};
let presets=[], session=null;
let runId=null, view=null, phase='select', failAt=null, t0=null;
let played=new Set(), seenSeq=new Set(), pollTimer=null, autoTimer=null;
let sel={model:null, vendor:null, label:null, topic:'Lumora modular sleep system launch', inject:'none', human:true, mission:'lumora'};
let critiques=[];

/* ===== lineage (robot colours / monograms — original emblems) ===== */
const LIN={
  openai:{body:'#10b981',trim:'#7df5c8',mono:'G'}, qwen:{body:'#9b6cff',trim:'#cbb0ff',mono:'Q'},
  zai:{body:'#39c5ff',trim:'#aee6ff',mono:'Z'}, mistral:{body:'#ff7a2f',trim:'#ffc199',mono:'M'},
  microsoft:{body:'#7bd64a',trim:'#cdf2ad',mono:'φ'}, meta:{body:'#4f8cff',trim:'#aecbff',mono:'L'},
  anthropic:{body:'#d98a4f',trim:'#ffcf99',mono:'A'}, nvidia:{body:'#76d800',trim:'#c4f78a',mono:'N'},
  sketchy:{body:'#ff4d5e',trim:'#ff9aa3',mono:'!'},
};
const lin=v=>LIN[v]||{body:'#6fd0ef',trim:'#bdeccf',mono:'?'};
function robot(vendor,pose='idle',scale=1){
  const c=lin(vendor);
  return `<div class="bot bot-${pose}" style="--bd:${c.body};--tr:${c.trim};transform:scale(${scale})">
    <span class="bot-ant"></span><span class="bot-head"></span>
    <span class="bot-visor"><i></i><i></i></span>
    <span class="bot-arm l"></span><span class="bot-arm r"></span>
    <span class="bot-body">${esc(c.mono)}</span>
    <span class="bot-leg l"></span><span class="bot-leg r"></span></div>`;
}
const TIER_OF=p=>p==='deep'?'deep':p==='standard'?'standard':p==='lexical'?'lexical':'deep';

/* ===== digital rain ===== */
(function rain(){
  const cv=$('#rain'),cx=cv.getContext('2d');let W,H,cols,drops,last=0;
  const glyphs='アカサタナハマヤラワ0123456789{}[]<>/\\=+*ABCDEF';
  function size(){W=cv.width=innerWidth;H=cv.height=innerHeight;cols=Math.floor(W/14);drops=Array(cols).fill(0).map(()=>Math.random()*-50);}
  size();addEventListener('resize',size);
  function frame(t){requestAnimationFrame(frame);if(t-last<55)return;last=t;
    cx.fillStyle='rgba(4,7,6,.2)';cx.fillRect(0,0,W,H);cx.font='13px monospace';
    for(let i=0;i<cols;i++){const ch=glyphs[Math.floor(Math.random()*glyphs.length)];
      cx.fillStyle=Math.random()<.04?'#aef7cf':'#1c9560';cx.fillText(ch,i*14,drops[i]*14);
      if(drops[i]*14>H&&Math.random()>.975)drops[i]=0;drops[i]++;}}
  requestAnimationFrame(frame);
})();

/* ===== header stepper ===== */
function stepIndex(p){return PHASES.indexOf(p);}
function renderStepper(){
  const cur=stepIndex(phase), fail=failAt?stepIndex(failAt):-1;
  $('#stepper').innerHTML=PHASES.map((p,i)=>{
    let cls='step';
    if(failAt&&p===failAt)cls+=' fail';
    else if(i===cur&&!failAt)cls+=' active';
    else if(i<cur)cls+=' done';
    if(failAt&&i>fail)cls+=' dim';
    const pre=(failAt&&p===failAt)?'✗ ':'';
    return `<span class="${cls}" data-p="${p}"><span class="dot"></span>${pre}${STEP_LABELS[p]}</span>`
      +(i<PHASES.length-1?'<span class="sep">›</span>':'');
  }).join('');
  $$('.step.done').forEach(el=>el.onclick=()=>{ if(played.has(el.dataset.p)||el.dataset.p==='select') setPhase(el.dataset.p); });
}
function setAgentChip(){
  const c=$('#agentChip');
  if(sel.label){c.hidden=false;c.innerHTML=`agent: <b>${esc(sel.label)}</b>`;}else c.hidden=true;
}

/* ===== console (mounted once; append by seq) ===== */
const toneClass=t=>({go:'c-go',pass:'c-go',nogo:'c-no',crit:'c-no',breach:'c-no',refused:'c-no',high:'c-high',
  held:'c-held',med:'c-held',await:'c-held',accent:'c-cyan',info:'c-cyan'}[t]||'c-mut');
function pushConsole(timeline){
  const body=$('#dockBody');
  if(!timeline||!timeline.length)return;
  if(seenSeq.size===0)body.innerHTML='';
  if(t0==null&&timeline[0])t0=timeline[0].ts;
  let added=0;
  timeline.forEach(r=>{
    if(seenSeq.has(r.seq))return;seenSeq.add(r.seq);added++;
    const rel=(t0!=null&&r.ts!=null)?'+'+(r.ts-t0).toFixed(1)+'s':'';
    const bad=(r.tone==='nogo'||r.tone==='crit'||r.tone==='breach'||r.tone==='refused');
    const row=document.createElement('div');row.className='logrow'+(bad?' bad':'');
    row.innerHTML=`<span class="t">${esc(rel)}</span><span class="sg">${esc(r.stage||'')}</span>`
      +`<span class="bd ${toneClass(r.tone)}">${esc((r.status||'').toUpperCase())}</span>`
      +`<span class="tx">${esc(r.text||'')}${r.meta?`<div class="mt">↳ ${esc(r.meta)}</div>`:''}</span>`;
    body.appendChild(row);
  });
  if(added){$('#dockN').textContent=seenSeq.size+' events';body.scrollTop=body.scrollHeight;}
}
function dockCost(){
  const c=(view&&view.cost)||null;if(!c||!c.present){$('#dockCost').textContent='';return;}
  $('#dockCost').textContent=`Σ ${(c.total_tokens||0).toLocaleString()} tok · $${(c.estimated_cost_usd||0).toFixed(4)} · ${c.wall_clock_s||0}s`;
}
$('#dockBar').onclick=()=>{$('#dock').classList.toggle('collapsed');
  $('#dockCaret').textContent=$('#dock').classList.contains('collapsed')?'▲':'▼';};

/* ===== auto-advance ===== */
function cancelAuto(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;}}
function startAuto(sec,fn,btnSel,label){
  cancelAuto();let n=sec;const b=btnSel?$(btnSel):null;
  const paint=()=>{if(b)b.textContent=`${label} · ${n}s`;};paint();
  autoTimer=setInterval(()=>{n--;paint();if(n<=0){cancelAuto();fn();}},1000);
}

/* ===== phase router ===== */
function setPhase(p){cancelAuto();phase=p;renderStepper();render();advance();}
function render(){
  renderStepper();setAgentChip();
  const fns={select:renderSelect,gauntlet:renderGauntlet,write:renderWrite,rehearsal:renderRehearsal,approval:renderApproval};
  (fns[phase]||renderSelect)();
}

/* ===== readiness gates ===== */
const gReady=()=>view&&view.gauntlet&&view.gauntlet.length>0;
const wReady=()=>view&&view.drafts&&view.drafts.length>0;
const rReady=()=>view&&view.panel&&view.panel.present;
const aReady=()=>view&&(view.awaiting||view.posted||view.halted);
function advance(){
  if(phase==='gauntlet'&&!played.has('gauntlet')&&gReady()){played.add('gauntlet');playGauntlet();}
  else if(phase==='write'&&!played.has('write')&&wReady()){played.add('write');playWrite();}
  else if(phase==='rehearsal'&&!played.has('rehearsal')&&rReady()){played.add('rehearsal');playRehearsal();}
  else if(phase==='approval'&&!played.has('approval')&&aReady()){played.add('approval');playApproval();}
}

/* ===== poll ===== */
async function tick(){
  if(!runId)return;
  try{
    view=await J('/api/runs/'+runId);
    pushConsole(view.timeline||[]);dockCost();
    try{session=await J('/api/attack-stats');}catch(e){}
    advance();
  }catch(e){/* transient */}
}

/* ===== launch ===== */
async function launch(){
  cancelAuto();played.clear();seenSeq.clear();t0=null;failAt=null;critiques=[];
  $('#dockBody').innerHTML='<div class="empty-log cur">launching… </div>';
  const sketchy=sel.model==='sketchy';
  const picked=sketchy?null:presets.find(p=>p.key===sel.model);
  const realOK=!!(picked&&picked.available);
  const scenario=sketchy?'reject':(sel.inject==='held'?'block':sel.inject==='faulty'?'faulty':'full');
  const body={mission:sel.mission, preset:realOK?sel.model:null, scenario, human_gate:sel.human};
  const r=await J('/api/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  runId=r.run_id;
  setPhase('gauntlet');
  if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(tick,1200);tick();
}

/* ===== SELECT ===== */
const DISPLAY=['gptoss120','qwen3','glm','mixtral','phi4','llama4','claude'];
function modelCards(){
  const out=[];
  DISPLAY.forEach(k=>{const p=presets.find(x=>x.key===k);if(p)out.push(p);});
  out.push({key:'sketchy',label:'SketchyAgent v0',vendor:'sketchy',model:'sketchy-agent-v0',profile:'untrust'});
  return out;
}
function renderSelect(){
  const cards=modelCards();
  const s=session||{};
  const sessStrip=s.attacks?`<div class="sess-strip">session proving ground · <b>${s.survived}/${s.attacks}</b> attacks survived · ${s.agents_refused} agent${s.agents_refused===1?'':'s'} refused</div>`:'';
  $('#stage').innerHTML=`<div class="wrap" style="animation:fadein .3s">
    <h1 class="h-arc" style="font-size:17px;margin:0 0 6px">SELECT AGENT</h1>
    <p class="sub">Pick the model that will research, write and ship the post. Before it touches the pipeline it must survive the <b style="color:var(--go)">Admission Gauntlet</b> — trust is earned, not assumed.</p>
    ${sessStrip}
    <div class="mgrid">${cards.map(card).join('')}</div>
    <div class="field-lbl">What should this post be about?</div>
    <input class="tinput" id="topic" value="${esc(sel.topic)}">
    <div class="chip-row" style="margin-top:10px">${['Lumora sleep launch','Giving Tuesday','Essence restock','Sleep tips thread'].map(c=>`<span class="qchip" data-q="${esc(c)}">${esc(c)}</span>`).join('')}</div>
    <div class="ctrls">
      <div><div class="field-lbl" style="margin:0 0 6px">demo inject (optional)</div>
        <div class="seg" id="seg">${[['none','none'],['held','medical claim'],['faulty','faulty judge']].map(([k,l])=>`<button data-k="${k}" class="${sel.inject===k?'on':''}">${l}</button>`).join('')}</div></div>
      <div><div class="field-lbl" style="margin:0 0 6px">human approval</div>
        <div class="toggle"><div class="tk ${sel.human?'on':''}" id="tk"><div class="knob"></div></div>
          <span class="tlabel">${sel.human?'ON · asks you first':'OFF · auto-posts'}</span></div></div>
      <button class="btn go arc" id="run" style="margin-left:auto" ${sel.model?'':'disabled'}>▶ RUN GAUNTLET</button>
    </div>
    <div class="hint">${hintFor()}</div>
  </div>`;
  // wire
  $$('.mcard').forEach(el=>el.onclick=()=>{const c=cards.find(x=>x.key===el.dataset.k);
    sel.model=c.key;sel.vendor=c.vendor;sel.label=c.label;render();});
  $$('.qchip').forEach(el=>el.onclick=()=>{sel.topic=el.dataset.q;$('#topic').value=el.dataset.q;});
  $('#topic').oninput=e=>sel.topic=e.target.value;
  $$('#seg button').forEach(b=>b.onclick=()=>{sel.inject=b.dataset.k;render();});
  $('#tk').onclick=()=>{sel.human=!sel.human;render();};
  const rb=$('#run');if(rb)rb.onclick=()=>{if(sel.model)launch();};
}
function card(c){
  const tier=c.profile==='untrust'?'untrust':TIER_OF(c.profile);
  const seld=sel.model===c.key?('sel'+(c.key==='sketchy'?' unt':'')):'';
  return `<div class="mcard ${seld}" data-k="${c.key}">
    <div style="height:48px;display:flex;align-items:flex-end">${robot(c.vendor,'idle')}</div>
    <div class="nm">${esc(c.label)}</div>
    <span class="tier ${tier}">${tier==='untrust'?'untrusted':c.profile}</span>
    <div class="id">${esc(c.model)}</div></div>`;
}
function hintFor(){
  if(sel.model==='sketchy')return '⚠ SketchyAgent v0 is untrusted — watch it fail the gauntlet and get refused.';
  if(sel.inject==='held')return '⚠ a medical claim will be injected — watch the rehearsal panel HOLD it.';
  if(sel.inject==='faulty')return '⚠ a faulty judge will hallucinate a citation — watch meta_check catch it.';
  if(!sel.human)return 'human approval OFF: on unanimous consent it will auto-post (dry-run).';
  return 'clean run — it will stop for your approval before posting.';
}

/* ===== GAUNTLET (simple data panel — upgraded in Step 4) ===== */
function gauntletCert(){
  const g=(view&&view.gauntlet)||[];
  return g.find(c=>!c.certified)||g.find(c=>/writer|research/i.test(c.agent))||g[0]||null;
}
function renderGauntlet(){
  $('#stage').innerHTML=`<div class="wrap"><h1 class="h-arc" style="font-size:14px">ADMISSION GAUNTLET</h1>
    <p class="sub">${esc(sel.label||'')} is running the 5-event attack course…</p>
    <div id="gres" style="margin-top:18px">${robot(sel.vendor,'run',1.4)}</div></div>`;
}
function playGauntlet(){
  const cert=gauntletCert();if(!cert)return;
  const certified=cert.certified;
  const rows=(cert.attacks||[]).map(a=>`<div class="glass" style="display:flex;gap:10px;align-items:center;margin:6px 0;border-color:${a.survived?'rgba(53,255,158,.3)':'rgba(255,84,102,.4)'}">
    <span style="font-size:18px">${a.survived?'✅':'💥'}</span>
    <b style="font-family:var(--mono);font-size:12px">${esc(a.attack)}</b>
    <span style="margin-left:auto;font-family:var(--mono);font-size:11px;color:${a.survived?'var(--go)':'var(--no)'}">${a.survived?'survived':'BREACH — '+esc(a.leaked||'')}</span></div>`).join('');
  const banner=certified
    ?`<div class="h-arc" style="font-size:14px;margin:10px 0">🏆 MODEL VERIFIED</div>
       <div class="glass" style="border-color:rgba(255,210,74,.4)">CERTIFICATE OF TRUST · ${esc(sel.label)} · ${(cert.attacks||[]).length}/${(cert.attacks||[]).length} cleared · policy all_survived · canary ${esc((cert.canary||'a3f97c2e')+'')} never leaked</div>
       <button class="btn go arc" id="gnext" style="margin-top:16px">▶ START MISSION</button>`
    :`<div class="h-arc" style="font-size:14px;color:var(--no);margin:10px 0">GAME OVER — BREACH</div>
       <button class="btn red" id="gretry" style="margin-top:16px">↻ PICK ANOTHER AGENT</button>`;
  $('#gres').innerHTML=rows+banner;
  if(certified){startAuto(3,()=>setPhase('write'),'#gnext','▶ START MISSION');}
  else{failAt='gauntlet';renderStepper();const b=$('#gretry');if(b)b.onclick=()=>{stopRun();setPhase('select');};}
}

/* ===== WRITE (simple — upgraded in Step 5) ===== */
function renderWrite(){$('#stage').innerHTML=`<div class="wrap"><h1 class="h-arc" style="font-size:12px">MISSION · research → write</h1>
  <p class="sub">the agent is searching and drafting…</p></div>`;}
function playWrite(){
  const r=view.research||{};const facts=r.facts||{};const src=r.sources||{};
  const drafts=(view.drafts||[]).filter(d=>d.stage==='write');
  const fcards=Object.keys(facts).map(id=>`<div class="glass" style="margin:6px 0"><b style="color:var(--go);font-family:var(--mono)">[${esc(id)}]</b> ${esc(facts[id])} ${src[id]?`<a style="color:var(--cyan);font-size:11px" href="https://${esc(src[id])}" target="_blank">🔗 ${esc(src[id])}</a>`:''}</div>`).join('');
  const dcards=drafts.map(d=>{
    let body=esc(d.text);(d.flags||[]).forEach(f=>{if(f.span){const s=esc(f.span);if(body.includes(s))body=body.split(s).join(`<mark style="background:rgba(255,84,102,.25);border-bottom:2px solid var(--no);color:#fff">${s}</mark>`);}});
    const fl=(d.flags||[]).map(f=>`<div style="font-family:var(--mono);font-size:11px;color:var(--no);border-left:2px solid var(--no);padding-left:8px;margin:3px 0">${esc(f.check)} — ${esc(f.reason)} ${f.span?`"${esc(f.span)}"`:''}</div>`).join('');
    return `<div class="glass" style="margin:8px 0"><div style="font-family:var(--mono);font-size:11px;color:var(--faint)">Draft #${d.attempt} · ${d.ok?'<span style="color:var(--go)">✓ passed checks</span>':'<span style="color:var(--no)">✗ flagged</span>'}</div>
      <div style="margin:6px 0;font-size:15px">${body}</div>${fl}</div>`;
  }).join('');
  $('#stage').innerHTML=`<div class="wrap"><h1 class="h-arc" style="font-size:12px">MISSION · Lumora Sleep — Launch Post</h1>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:14px">
      <div><div class="field-lbl">sources · what it searched</div>${fcards||'<p class="sub">—</p>'}</div>
      <div><div class="field-lbl">drafts · what it wrote</div>${dcards||'<p class="sub">—</p>'}</div></div>
    <button class="btn go arc" id="wnext" style="margin-top:16px">▶ REHEARSAL</button></div>`;
  startAuto(3,()=>setPhase('rehearsal'),'#wnext','▶ REHEARSAL');
}

/* ===== REHEARSAL (simple — upgraded in Step 6) ===== */
function renderRehearsal(){$('#stage').innerHTML=`<div class="wrap"><h1 class="h-arc" style="font-size:12px">REHEARSAL · the digital twin</h1><p class="sub">the review panel is reading the post…</p></div>`;}
function playRehearsal(){
  const p=view.panel||{};const judges=p.judges||[];
  const post=view.post||{};
  const eligible=p.eligible;
  const reps=judges.map(j=>{const tier=TIER_OF(j.profile);
    return `<div class="glass" style="margin:6px 0;border-color:${j.pass?'rgba(53,255,158,.25)':'rgba(255,84,102,.4)'}">
      <div style="display:flex;align-items:center;gap:8px">${robot(vendorOfJudge(j.name),'idle',.6)}
        <b>${esc(j.name)}</b><span class="tier ${tier}">${j.profile}</span>
        <span style="margin-left:auto;font-family:var(--mono);font-size:11px;color:${j.pass?'var(--go)':'var(--no)'}">${j.pass?'PASS':'HELD'}</span></div>
      <div style="margin-top:4px;color:var(--dim);font-size:13px">${esc(j.comment||'')}</div></div>`;}).join('');
  const banner=eligible?`<div class="glass" style="border-color:rgba(53,255,158,.4);color:var(--go)">✓ UNANIMOUS CONSENT · publish-eligible</div>`
    :`<div class="glass" style="border-color:rgba(255,180,84,.4);color:var(--held)">❚❚ HELD · the panel flagged it — it never reaches X</div>`;
  $('#stage').innerHTML=`<div class="wrap"><h1 class="h-arc" style="font-size:12px">REHEARSAL · FAKE X SIM — egress disabled</h1>
    <div class="glass" style="margin:12px 0"><b>${esc(post.author||'@lumorasleep')}</b><div style="font-size:18px;margin-top:6px">${esc(stripCites(post.text||''))}</div></div>
    ${banner}<div style="margin-top:10px">${reps}</div>
    ${eligible?'<button class="btn go arc" id="rnext" style="margin-top:14px">▶ FINAL APPROVAL</button>':''}</div>`;
  if(eligible){startAuto(3,()=>setPhase('approval'),'#rnext','▶ FINAL APPROVAL');}
  else{failAt='rehearsal';renderStepper();}
}
function vendorOfJudge(name){const n=(name||'').toLowerCase();
  if(n.includes('gpt'))return 'openai';if(n.includes('qwen'))return 'qwen';if(n.includes('glm'))return 'zai';
  if(n.includes('mixtral')||n.includes('mistral'))return 'mistral';if(n.includes('phi'))return 'microsoft';
  if(n.includes('llama'))return 'meta';if(n.includes('claude')||n.includes('anthropic'))return 'anthropic';
  if(n.includes('nemotron')||n.includes('nvidia'))return 'nvidia';return 'openai';}

/* ===== APPROVAL (functional) ===== */
function renderApproval(){$('#stage').innerHTML=`<div class="wrap" style="max-width:680px"><h1 style="font-size:24px;color:var(--ink-bright);font-family:var(--sans);font-weight:600">Final approval</h1><p class="sub">awaiting…</p></div>`;}
function playApproval(){
  const post=view.post||{};const panel=view.panel||{};
  const eligible=panel.eligible;const judges=panel.judges||[];
  const approves=judges.filter(j=>j.pass).length;
  const posted=view.posted;
  const verdictColor=eligible?'var(--go)':'var(--held)';
  const payload=`<div class="glass" style="margin:14px 0">
      <div style="font-family:var(--mono);font-size:11px;color:var(--faint)">${esc(post.author||'@lumorasleep')} · ${stripCites(post.text||'').length}/280</div>
      <div style="font-size:17px;margin:8px 0">${esc(stripCites(post.text||''))}</div>
      <div style="display:flex;gap:16px;font-family:var(--mono);font-size:11px;color:var(--faint);border-top:1px solid var(--hair);padding-top:8px">
        <span>agent ${esc(sel.label||'')}</span><span>egress disabled</span><span>panel ${approves}/${judges.length} approve</span>
        ${view.cost&&view.cost.present?`<span class="cost" style="color:var(--cyan)">$${(view.cost.estimated_cost_usd||0).toFixed(4)} est</span>`:''}</div></div>`;
  let action;
  if(posted){
    action=postedCard();
  }else if(view.awaiting){
    action=`<p class="sub">the panel reached unanimous consent — you may approve.</p>
      <div style="display:flex;gap:12px;margin-top:10px">
        <button class="btn go" id="pass" ${eligible?'':'disabled'} style="flex:1">Pass & post</button>
        <button class="btn red" id="fail" style="flex:1">Fail & revise</button></div>
      ${eligible?'':'<div class="hint">the harness will not post a held draft. send it back instead.</div>'}
      <div id="revbox"></div>`;
  }else{
    action=`<div class="glass" style="color:var(--held)">❚❚ This run was HELD before Action — there is nothing to approve.</div>`;
  }
  $('#stage').innerHTML=`<div class="wrap" style="max-width:680px">
    <h1 style="font-size:24px;color:var(--ink-bright);font-weight:600;margin:0">Final approval</h1>
    <p class="sub">Nothing reaches X without a recorded human decision.</p>
    <div style="font-family:var(--mono);font-size:12px;color:${verdictColor};margin-top:8px">● ${eligible?'UNANIMOUS CONSENT · publish-eligible':'HELD'}</div>
    ${payload}${action}</div>`;
  wireApproval();
}
function postedCard(){
  const post=view.post||{};
  return `<div class="glass" style="border-color:rgba(53,255,158,.4)">
    <div style="color:var(--go);font-weight:600">● Posted · dry run</div>
    <p class="sub" style="margin:6px 0">Approval recorded. The post shipped in dry-run with a takedown armed — nothing was sent to the network.</p>
    <a class="qchip" style="display:inline-block" href="https://x.com/lumorasleep/status/${esc(post.post_id||'0')}" target="_blank">🔗 x.com/lumorasleep/status/${esc(post.post_id||'0')} (dry-run)</a>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button class="btn ghost" id="dlj">⤓ audit.json</button>
      <button class="btn ghost" id="dlh">⎙ report</button>
      ${view.can_takedown?'<button class="btn red" id="tkd">Take down (rollback)</button>':''}
      <button class="btn" id="again" style="margin-left:auto">Run another mission</button></div></div>`;
}
function wireApproval(){
  const pass=$('#pass');if(pass)pass.onclick=async()=>{pass.disabled=true;pass.textContent='posting…';
    const j=await J('/api/runs/'+runId+'/approve',{method:'POST'});
    if(!j.ok){pass.disabled=false;pass.textContent='Pass & post';alert(j.reason||'refused');}else{await tick();playApproval();}};
  const fail=$('#fail');if(fail)fail.onclick=()=>{
    $('#revbox').innerHTML=`<div class="glass" style="margin-top:12px"><div class="field-lbl" style="margin:0 0 8px">what should the writer change?</div>
      <textarea class="tinput" id="corr" style="min-height:70px" placeholder="e.g. drop the medical framing, lead with the ritual, keep every stat cited…"></textarea>
      <label style="display:flex;gap:8px;align-items:center;margin:10px 0;font-family:var(--mono);font-size:12px;color:var(--dim)"><input type="checkbox" id="save"> save as a standing guardrail for this mission</label>
      <div style="display:flex;gap:10px"><button class="btn red" id="logback">Log & send back</button><button class="btn ghost" id="cancel">Cancel</button></div></div>`;
    $('#cancel').onclick=()=>{$('#revbox').innerHTML='';};
    $('#logback').onclick=async()=>{const t=$('#corr').value.trim();if(!t){alert('type a correction first');return;}
      const save=$('#save').checked;
      if(save&&!confirm('Save as a STANDING guardrail for this mission? Every future run will follow it (rulebook edit, not training).'))return;
      const lb=$('#logback');lb.disabled=true;lb.textContent='re-running…';
      const j=await J('/api/runs/'+runId+'/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({correction:t,save})});
      if(!j||!j.ok){lb.disabled=false;lb.textContent='Log & send back';alert((j&&j.reason)||'failed');return;}
      critiques.push(t);runId=j.run_id;played.clear();seenSeq.clear();t0=null;failAt=null;setPhase('write');tick();};
  };
  const dlj=$('#dlj');if(dlj)dlj.onclick=()=>{const a=document.createElement('a');a.href='/api/runs/'+runId+'/report';a.download='audit-'+runId+'.json';a.click();};
  const dlh=$('#dlh');if(dlh)dlh.onclick=()=>window.open('/api/runs/'+runId+'/report.html','_blank');
  const tkd=$('#tkd');if(tkd)tkd.onclick=async()=>{if(!confirm('Take down (record rollback)?'))return;await J('/api/runs/'+runId+'/takedown',{method:'POST'});await tick();playApproval();};
  const again=$('#again');if(again)again.onclick=()=>{stopRun();setPhase('select');};
}

function stopRun(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}cancelAuto();runId=null;view=null;played.clear();}

/* ===== boot ===== */
async function boot(){
  try{presets=await J('/api/presets');}catch(e){presets=[];}
  try{session=await J('/api/attack-stats');}catch(e){}
  setPhase('select');
}
boot();
</script>
</body>
